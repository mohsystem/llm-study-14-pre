name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  analysis:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Java (required for Gradle + Sonar)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      # 3️⃣ Cache Sonar packages (faster runs)
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      # 4️⃣ Fix gradlew permission
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # 5️⃣ Build project
      - name: Build project
        run: ./gradlew build

      # 6️⃣ SonarCloud analysis
      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=mohsystem_llm-study-14-pre2 \
            -Dsonar.organization=mohsystem